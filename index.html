<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Snake Leaderboard Arcade</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="heading">
          <div>
            <p class="eyebrow">Classic Arcade</p>
            <h1>Snake Leaderboard Arcade</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <section id="start-screen" class="stack">
          <p class="intro">
            Enter a player name, start a run, and try to climb the local
            leaderboard.
          </p>

          <form id="start-form" class="player-form">
            <label class="field">
              <span>Player name</span>
              <input
                id="player-name-input"
                name="playerName"
                type="text"
                maxlength="16"
                placeholder="Player 1"
                autocomplete="nickname"
                required
              />
            </label>
            <button id="start-button" type="submit">Start Game</button>
          </form>
        </section>

        <section id="game-shell" class="stack hidden">
          <div class="meta-grid">
            <div class="meta-card">
              <span>Player</span>
              <strong id="player-name">Guest</strong>
            </div>
            <div class="meta-card">
              <span>Best</span>
              <strong id="player-best">0</strong>
            </div>
            <div class="meta-card">
              <span>Rank</span>
              <strong id="player-rank">-</strong>
            </div>
          </div>

          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
            <button id="change-player-button" type="button">Change Player</button>
          </div>

          <p id="status" class="status">Use arrow keys or WASD to steer.</p>

          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake game board"
          ></div>

          <div class="controls" aria-label="Touch controls">
            <button type="button" data-direction="up" aria-label="Move up">↑</button>
            <div class="controls-row">
              <button type="button" data-direction="left" aria-label="Move left">←</button>
              <button type="button" data-direction="down" aria-label="Move down">↓</button>
              <button type="button" data-direction="right" aria-label="Move right">→</button>
            </div>
          </div>
        </section>

        <section class="stack">
          <div class="leaderboard-header">
            <h2>Leaderboard</h2>
            <p class="leaderboard-note">Top local scores stored in this browser.</p>
          </div>
          <ol id="leaderboard" class="leaderboard-list"></ol>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
